name: Release PHAR

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

concurrency:
  group: release-phar-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build and publish PHAR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer

      - name: Build PHAR
        run: composer run phar:build

      - name: Verify PHAR
        run: php dist/slop-scan.phar --help

      - name: Create GitHub release and upload PHAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/slop-scan.phar
          fail_on_unmatched_files: true
